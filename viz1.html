<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Genres by Age</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
  body { font-family: 'Poppins', sans-serif; background:#f5f7fa; color:#333; margin:0; padding:20px;}
  #chart { width: 100%; max-width: 1000px; height: 600px; margin: auto; }
</style>
</head>
<body>
<h1 style="text-align:center;">Top Genres by Age</h1>
<div id="chart"></div>

<script>
// Load the JSON data
fetch('agg_data.json')
  .then(response => response.json())
  .then(data => {
    const topArtists = [...new Set(data.map(d => d["Most Played Artist"]))];

    // Function to get traces for an artist
    function getTraces(artist) {
      const artistData = data.filter(d => d["Most Played Artist"] === artist);
      const genres = [...new Set(artistData.map(d => d["Top Genre"]))];
      return genres.map(genre => {
        const genreData = artistData.filter(d => d["Top Genre"] === genre);
        return {
          x: genreData.map(d => d["Age"]),
          y: genreData.map(d => d["Count"]),
          mode: 'lines+markers',
          name: genre
        };
      });
    }

    // Initial plot with first artist
    const initialArtist = topArtists[0];
    const traces = getTraces(initialArtist);

    const layout = {
      title: "Understanding the Age and Genre Profile of an Artist’s Audience",
      xaxis: { title: "Age" },
      yaxis: { title: "Number of Listeners" },
      updatemenus: [{
        buttons: topArtists.map(artist => ({
          method: 'restyle',
          args: ['y', getTraces(artist).map(t => t.y)],
          label: artist
        })),
        direction: "down",
        x: 0.5,
        xanchor: "center",
        y: 1.15,
        yanchor: "top",
        showactive: true,
        bgcolor: "lightgrey"
      })]
    };

    Plotly.newPlot('chart', traces, layout);
  });
</script>
</body>
</html>
